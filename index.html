<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title"></title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo-container">
                <img id="site-logo" class="logo-img" alt="">
                <div class="logo-text">
                    <h1 id="header-title"></h1>
                    <p id="header-subtitle"></p>
                </div>
            </div>
            
            <nav>
                <ul id="nav-menu">
                    <!-- CMS will inject menu items -->
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero-banner">
        <div class="hero-glass-container">
            <h2 id="hero-title"></h2>
            <p class="motto" id="hero-motto"></p>
            <p class="sub-motto" id="hero-subtitle"></p>
            <a id="hero-button" class="btn-primary"></a>
        </div>
    </section>

    <main>
        <section class="clarification-note">
            <div class="container">
                <h3 id="clarification-title"></h3>
                <div id="clarification-body"></div>
            </div>
        </section>

        <section class="communities-preview">
            <div class="container">
                <div class="section-title">
                    <h3 id="communities-title"></h3>
                    <p id="communities-subtitle"></p>
                </div>
                
                <div class="grid-communities" id="communities-grid">
                    <!-- CMS will inject community cards -->
                </div>
            </div>
        </section>

        <section class="highlights">
            <div class="container">
                <h3 id="highlights-title"></h3>
                <div class="highlights-container" id="highlights-container">
                    <!-- CMS will inject highlight items -->
                </div>
                <div class="center-btn">
                    <a id="highlights-button" class="btn-link"></a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-grid">
            <div class="footer-about">
                <h5 id="footer-title"></h5>
                <p id="footer-description"></p>
            </div>
            <div class="footer-links">
                <h5 id="footer-links-title"></h5>
                <ul id="footer-links-list"></ul>
            </div>
            <div class="footer-contact">
                <h5 id="footer-contact-title"></h5>
                <p id="footer-email"></p>
                <p id="footer-location"></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p id="footer-copyright"></p>
            <p id="footer-civil-note" class="civil-note"></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/cms.js"></script>
    <script>
      (function () {
        var hash = window.location.hash || '';
        if (hash.includes('_token=')) {
          // send user to /admin with the same hash
          window.location.href = '/admin/' + hash;
        }
      })();
    </script>


</body>
</html>
