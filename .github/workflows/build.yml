name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Remove old generated HTML files only
        run: |
          rm -f index.html
          rm -f 404.html
          find . -maxdepth 1 -type f -name "*.html" -not -path "./build-output/*" -delete

      - name: Copy new generated pages
        run: |
          cp -r build-output/* .

      - name: Commit and push to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Deploy static site" || echo "No changes to commit"

          # Fix non-fast-forward errors
          git pull --rebase origin main || true

          git push origin HEAD:main
