backend:
  name: git-gateway
  branch: main

media_folder: "static/img"
public_folder: "/img"

site_url: "https://igrejaveterocatolica.netlify.app"

collections:

  # HOME PAGE (Markdown)
  - name: "home"
    label: "Home Page"
    files:
      - label: "Home Content"
        name: "home"
        file: "content/home.md"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Motto", name: "hero_motto", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Hero Button Text", name: "hero_button_text", widget: "string" }
          - { label: "Hero Button Link", name: "hero_button_link", widget: "string" }
          - { label: "Clarification Title", name: "clarification_title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

  # SITE SETTINGS (JSON)
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "settings"
        file: "content/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Header Title", name: "header_title", widget: "string" }
          - { label: "Header Subtitle", name: "header_subtitle", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Footer Title", name: "footer_title", widget: "string" }
          - { label: "Footer Description", name: "footer_description", widget: "text" }
          - { label: "Footer Contact Title", name: "footer_contact_title", widget: "string" }
          - { label: "Footer Email", name: "footer_email", widget: "string" }
          - { label: "Footer Location", name: "footer_location", widget: "string" }
          - { label: "Footer Copyright", name: "footer_copyright", widget: "string" }
          - { label: "Footer Civil Note", name: "footer_civil_note", widget: "string" }

  # MENU (JSON)
  - name: "menu"
    label: "Navigation Menu"
    files:
      - label: "Menu Items"
        name: "menu"
        file: "content/menu.json"
        fields:
          - label: "Menu"
            name: ""
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

  # COMMUNITIES (JSON)
  - name: "communities"
    label: "Communities"
    files:
      - label: "Communities List"
        name: "communities"
        file: "content/communities.json"
        fields:
          - label: "Communities"
            name: "communities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Button Text", name: "button", widget: "string" }
              - { label: "Link", name: "link", widget: "string" }

  # HIGHLIGHTS (JSON)
  - name: "highlights"
    label: "Highlights"
    files:
      - label: "Highlights Section"
        name: "highlights"
        file: "content/highlights.json"
        fields:
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Button Text", name: "button_text", widget: "string" }
          - { label: "Button Link", name: "button_link", widget: "string" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Month", name: "month", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  # FOOTER LINKS (JSON)
  - name: "footer_links"
    label: "Footer Links"
    files:
      - label: "Footer Links"
        name: "footer_links"
        file: "content/footer.json"
        fields:
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

  # PAGES (Markdown)
  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: true
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
