<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title"></title>

    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="container header-flex">
            <div class="logo-container">
                <a href="/">
                    <img id="site-logo" class="logo-img" alt="">
                </a>
                <div class="logo-text">
                    <h1 id="header-title"></h1>
                    <p id="header-subtitle"></p>
                </div>
            </div>

            <nav>
                <ul id="nav-menu"></ul>
            </nav>
        </div>
    </header>

    <!-- PAGE HERO -->
    <section class="page-hero">
        <div class="container">
            <h2 id="page-title"></h2>
        </div>
    </section>

    <!-- PAGE CONTENT -->
    <main>
        <section class="page-content">
            <div class="container">
                <div id="page-body"></div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container footer-grid">
            <div class="footer-about">
                <h5 id="footer-title"></h5>
                <p id="footer-description"></p>
            </div>

            <div class="footer-links">
                <h5 id="footer-links-title"></h5>
                <ul id="footer-links-list"></ul>
            </div>

            <div class="footer-contact">
                <h5 id="footer-contact-title"></h5>
                <p id="footer-email"></p>
                <p id="footer-location"></p>
            </div>
        </div>

        <div class="footer-bottom">
            <p id="footer-copyright"></p>
            <p id="footer-civil-note" class="civil-note"></p>
        </div>
    </footer>

    <!-- JS -->
    <script src="/js/cms.js"></script>
    <script>
      const pageName = window.location.hash.replace("#", "") || "home";
      loadPage(pageName);
    </script>

    <script>
      function loadFromHash() {
        const pageName = window.location.hash.replace("#", "") || "home";
        loadPage(pageName);
      }
    
      // Load on first page load
      loadFromHash();
    
      // Load again when clicking links that change the hash
      window.addEventListener("hashchange", loadFromHash);
    </script>


</body>
</html>
