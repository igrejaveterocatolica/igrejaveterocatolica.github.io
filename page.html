<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{browser_title}}</title>

    <!-- OPEN GRAPH FOR PREVIEWS -->
    <meta property="og:title" content="{{browser_title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="https://igrejacatolicajerusalem.pt/img/facebook-share-preview.jpg" />
    <meta property="og:type" content="article">

    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="container header-flex">
            <div class="logo-container">
                <a href="/">
                    <img src="{{site_logo}}" class="logo-img" alt="">
                </a>
                <div class="logo-text">
                    <h1>{{header_title}}</h1>
                    <p>{{header_subtitle}}</p>
                </div>
            </div>

            <nav>
                <ul>
                    {{nav_menu}}
                </ul>
            </nav>
        </div>
    </header>

    <!-- PAGE HERO -->
    <section class="page-hero">
        <div class="container">
            <h2>{{title}}</h2>
        </div>
    </section>

    <!-- PAGE CONTENT -->
    <main>
        <section class="page-content">
            <div class="container">
                <div>{{body}}</div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container footer-grid">
            <div class="footer-about">
                <h5>{{footer_title}}</h5>
                <p>{{footer_description}}</p>
            </div>

            <div class="footer-links">
                <h5>Links</h5>
                <ul>
                    {{footer_links}}
                </ul>
            </div>

            <div class="footer-contact">
                <h5>{{footer_contact_title}}</h5>
                <p>{{footer_email}}</p>
                <p>{{footer_location}}</p>
            </div>
        </div>

        <div class="footer-bottom">
            <p>{{footer_copyright}}</p>
            <p class="civil-note">{{footer_civil_note}}</p>
        </div>
    </footer>

</body>
</html>
